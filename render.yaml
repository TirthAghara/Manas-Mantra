services:
  - type: web
    name: manas-mantra-backend
    runtime: node
    buildCommand: npm ci --prefix backend
    startCommand: npm --prefix backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: manas-mantra-frontend
    runtime: static
    buildCommand: npm ci --prefix frontend && npm run build --prefix frontend
    staticPublishPath: ./frontend/dist
    routes:
      - path: /
        destination: /index.html